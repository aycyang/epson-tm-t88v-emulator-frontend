<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Epson TM-T88V Emulator</title>
  <style>
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    td {
      border: 1px solid gray;
      overflow: scroll;
      text-wrap-mode: nowrap;
    }
    #emulatorDisplay {
      border: 1px solid gray;
    }
  </style>
</head>
<body>
<h1>Epson TM-T88V Emulator</h1>

<div class="container">

<div class="item">
<span>input ESC/POS:</span>
<br>
<textarea id="input"></textarea>
<br>
<span>parsed ESC/POS:</span>
<div id="output"></div>
<br>
<pre id="error" style="color:red"></pre>
</div>

<div class="item">
<span>output (canvas):</span>
<br>
<canvas id="emulatorDisplay" width="512"></canvas>
</div>

</div>

<script type="module" src="main.js"></script>
</body>
</html>
